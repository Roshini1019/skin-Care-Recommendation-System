<!DOCTYPE html>
<html>
<head>

<title>Skin Care Recommendation</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

<h1>Skin Care Recommendation System</h1>

<h3>Select Skin Type</h3>

<select id="skinType">

<option value="" disabled selected>Please select a skin type</option>

<option value="oily">Oily</option>
<option value="dry">Dry</option>
<option value="combination">Combination</option>
<option value="normal">Normal</option>
<option value="sensitive">Sensitive</option>

</select>

<h3>Select Skin Concerns</h3>

<label><input type="checkbox" value="acne"> Acne</label>
<label><input type="checkbox" value="pigmentation"> Pigmentation</label>
<label><input type="checkbox" value="aging"> Aging</label>
<label><input type="checkbox" value="dryness"> Dryness</label>
<label><input type="checkbox" value="redness"> Redness</label>
<label><input type="checkbox" value="darkspots"> Dark Spots</label>

<br><br>

<button onclick="getRecommendation()">Get Recommendation</button>

<button onclick="resetForm()">Reset</button>

<div id="result"></div>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
